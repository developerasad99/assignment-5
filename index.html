<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles/style.css">
    <!-- google font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<!-- icon  -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  </head>
  <body>
    <!-- form  -->
     <section class="" id="loginSection">
    <div class="bg-gray-50">
      <div class="min-h-screen flex flex-col items-center justify-center py-6 px-4">
        <div class="max-w-[480px] w-full">

          <div class="p-6 sm:p-8 rounded-2xl bg-white border border-gray-200 shadow-sm">
            <div class="flex flex-col justify-center items-center">
              <img src="assets/github-logo.png" alt="">
            <h1 class="text-slate-900 text-center text-3xl font-semibold mt-4">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] text-center text-lg">Sign in to manage your issues</p>
            </div>
            <div class="mt-12 space-y-6">
              <div>
                <label class="text-slate-900 text-sm font-medium mb-2 block">User name</label>
                <div class="relative flex items-left flex-col">
                  <input id="username" name="username" type="text" class="w-full text-slate-900 text-sm border border-slate-300 px-4 py-3 pr-8 rounded-md outline-blue-600" placeholder="Enter user name" />
                  <p class="text-[#4A00FF] text-sm font-medium mb-2 block">Default: admin</p>
                  
                </div>
              </div>
              <div>
                <label class="text-slate-900 text-sm font-medium mb-2 block">Password</label>
                <div class="relative flex items-left flex-col">
                  <input id="password" name="password" type="password"  class="w-full text-slate-900 text-sm border border-slate-300 px-4 py-3 pr-8 rounded-md outline-blue-600" placeholder="Enter password" />
                  <p class="text-[#4A00FF] text-sm font-medium mb-2 block">admin123</p>
                  
                </div>
              </div>
             

              <div class="!mt-12">
                <button type="button" onclick="loginValidation()" class="w-full py-2 px-4 text-[15px] font-medium tracking-wide rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none cursor-pointer">
                  Sign in
                </button>
              </div>
              
            </div>
      <div class="flex items-center my-6">
      <div class="flex-grow border-t border-gray-400"></div>
        <span class="mx-3 text-gray-500 uppercase">or</span>
        <div class="flex-grow border-t border-gray-400"></div>
      </div>

      <div>
          <p class="text-[#64748B] text-center text-sm">Demo Credentials:</p>
          <div class="mt-4 flex justify-center items-center px-1 py-6 flex-col bg-[#F8FAFC] rounded-xl">
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
          </div>
      </div>
          </div>
          
        </div>
        
      </div>
      
    </div>  
    
     </section>
<!-- form  -->
<main id="mainSection" class="hidden">
    <!-- header section  -->
  <section>
      <div class="navbar bg-base-100 shadow-sm">
          <div class="navbar w-[80%] mx-auto flex justify-between gap-3 md:gap-0 flex-col md:flex-row">
            <div class="">
    <h2 class="flex items-center text-2xl gap-2 font-bold">
      <img class="w-12" src="assets/github-logo.png" alt="">
      GitHub Issues Tracker
    </h2>
    
  </div>
  <div class="flex gap-2 flex-col md:flex-row">
    <input id="searchText" required type="text" placeholder="&#128269 Search issues..." class="input input-bordered  md:w-auto" />
        <button onclick="loadSearchData()" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Search Issue</button>
<h1 class=""></h1>
          </div>
          </div>
    </div>
</div>
    </section>
    <!-- end header section  -->
     <section class="mt-20">
      <div class="tabSection w-[80%] mx-auto shadow p-4">
        <button id="all" onclick="loadAllData('all')" class="btn status w-20 btn-primary">All</button>
        <button id="open" onclick="loadAllData('open')" class="btn status w-20">Open</button>
        <button id="close" onclick="loadAllData('closed')" class="btn status w-20">Closed</button>
      </div>
     </section>
     <!-- end tap section  -->

     <!-- start counter Section  -->
      <section class="mt-6">
      <div class="tabSection w-[80%] mx-auto shadow p-4">
         <div class="flex justify-between items-center">
              <div class="flex gap-2">
                
                  <div class="bg-[#ddd] rounded-full flex justify-center items-center p-2 gap-2">
                    <img class="w-full" src="assets/Aperture.png" alt="">
                  </div>
                  <div>
                    <h1 class="text-lg font-bold"><span id="counter">0</span> Issues</h1>
                    <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
                  </div>
                </div>
              
              <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                  <div class="w-3 h-3 bg-[#00A96E] rounded-full "></div>
                  <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                  <div class="w-3 h-3 bg-[#A855F7] rounded-full "></div>
                  <p>Closed</p>
                </div>
              </div>
         </div>
      </div>
     </section>
     <section class="flex justify-center items-center">
      <span id="spinner" class="loading loading-dots loading-xl mt-12 hidden"></span>

     </section>
     <!-- end counter section  -->
      <section >
            <div id="renderSection" class="tabSection w-[80%] mx-auto shadow-lg p-8 grid grid-cols-1 lg:grid-cols-4 gap-4">
                
                
            </div>
      </section>
      <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="modal" class="modal  modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="modalContainer">
       

    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary outline-none border-0">Close</button>
      </form>
    </div>
  </div>
</dialog>
</main>
  
    
      <script src="js/script.js"></script>
  </body>
</html>
